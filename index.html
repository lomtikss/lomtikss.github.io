<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Список просмотренных аниме">
    <title>Мой Список Аниме</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <header>
            <button id="langToggle" class="lang-btn">RU</button>
            <h1 id="pageTitle">Made by lomtik</h1>
            <p id="pageDesc">Список просмотренных тайтлов</p>
        </header>

        <main>
            <div class="stats">
                <div class="stats-label">Всего тайтлов: <strong id="totalCount">0</strong></div>
            </div>
            
            <ul id="animeList" class="anime-grid">
            </ul>
        </main>
    </div>

    <div class="views-counter" title="Всего просмотров сайта">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
        </svg>
        <span id="viewCount" class="counter-loading">...</span>
    </div>
    <script src="data.js"></script>
    <script>
        const animeListEl = document.getElementById('animeList');
        const totalCountEl = document.getElementById('totalCount');
        const langToggleBtn = document.getElementById('langToggle');
        const pageTitleEl = document.getElementById('pageTitle');
        const pageDescEl = document.getElementById('pageDesc');
        const statsLabelEl = document.querySelector('.stats-label');    

        let currentLang = localStorage.getItem('appLang') || 'ru';
        const translations = {
            ru: {
                title: "Made by lomtik",
                desc: "Список просмотренных Аниме",
                total: "Всего тайтлов: ",
                noRating: "Без оценки",
                toggle: "EN"
            },
            en: {
                title: "Made by lomtik",
                desc: "List of watched anime",
                total: "Total anime: ",
                noRating: "No rating",
                toggle: "RU"
            }
        };

        function updateStaticText() {
            const t = translations[currentLang];
            pageTitleEl.textContent = t.title;
            pageDescEl.textContent = t.desc;
            statsLabelEl.childNodes[0].nodeValue = t.total;
            langToggleBtn.textContent = t.toggle;
        }

        langToggleBtn.addEventListener('click', () => {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            localStorage.setItem('appLang', currentLang);
            updateStaticText();
            renderList(animeData);
        });

        updateStaticText();



        function getStarsHTML(rating) {
            let html = '';
            for(let i=1; i<=5; i++) {
                let fill = 0;
                if(rating >= i) fill = 100;
                else if(rating >= i - 0.5) fill = 50;
                html += `<span class="star" data-index="${i}" style="--fill: ${fill}%">★</span>`;
            }
            return html;
        }



        function renderList(list) {
            animeListEl.innerHTML = '';
            const t = translations[currentLang];
            
            const sortedList = [...list].sort((a, b) => {
                const ratingA = a.rating || 0;
                const ratingB = b.rating || 0;
                return ratingB - ratingA;
            });
            
            sortedList.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'anime-card';
                li.style.animationDelay = `${Math.min(index * 0.03, 0.5)}s`;
                
                const currentRating = item.rating || 0;
                const displayTitle = currentLang === 'en' && item.titleEn ? item.titleEn : item.title;
                
                li.innerHTML = `
                    <div class="card-cover-wrapper">
                        <img class="card-cover loaded" src="${item.cover}" onerror="this.onerror=null; this.src='https://via.placeholder.com/100x140/1e293b/8b5cf6?text=${encodeURIComponent(displayTitle.charAt(0).toUpperCase())}';" alt="Cover">
                    </div>
                    <div class="card-content">
                        <h3>${displayTitle}</h3>
                        <div class="rating-container">
                            <div class="stars">
                                ${getStarsHTML(currentRating)}
                            </div>
                            <div class="rating-value">${currentRating > 0 ? currentRating + ' / 5' : t.noRating}</div>
                        </div>
                    </div>
                `;
                animeListEl.appendChild(li);
            });
            
            totalCountEl.textContent = sortedList.length;
        }

        renderList(animeData);
    </script>
</body>
</html>
